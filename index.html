<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #f0f0f0;
            --accent-1: #4f46e5; /* Indigo */
            --accent-2: #ec4899; /* Pink */
            --accent-3: #06b6d4; /* Cyan */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Space Grotesk', sans-serif;
            height: 100vh;
            overflow: hidden; /* Mencegah scroll */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* --- BACKGROUND ANIMATION (AMBIENT ORBS) --- */
        .ambient-light {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            filter: blur(80px); /* Efek blur ekstrem untuk nuansa halus */
            opacity: 0.6;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            animation: moveOrb 20s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: var(--accent-1);
            top: -10%;
            left: -10%;
            animation-duration: 25s;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: var(--accent-2);
            bottom: -10%;
            right: -5%;
            animation-duration: 18s;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 200px;
            height: 200px;
            background: var(--accent-3);
            top: 40%;
            left: 40%;
            animation-duration: 22s;
            animation-delay: -10s;
        }

        @keyframes moveOrb {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, 50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(10px, -30px) scale(1); }
        }

        /* --- MAIN CONTENT & TYPOGRAPHY --- */
        .container {
            z-index: 10;
            text-align: center;
            mix-blend-mode: overlay; /* Membuat teks menyatu indah dengan background */
        }

        /* Animasi Garis Loading */
        .loader-line {
            width: 0%;
            height: 2px;
            background: white;
            margin: 0 auto 30px auto;
            animation: loadLine 2.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        /* Teks Utama */
        h1 {
            font-size: 8vw; /* Responsif mengikuti lebar layar */
            font-weight: 700;
            line-height: 1;
            text-transform: uppercase;
            letter-spacing: -2px;
            margin-bottom: 20px;
            
            /* Masking Effect untuk Reveal */
            clip-path: polygon(0 100%, 100% 100%, 100% 100%, 0% 100%);
            transform: translateY(100px);
            opacity: 0;
            
            animation: textReveal 1.5s cubic-bezier(0.19, 1, 0.22, 1) 0.5s forwards,
                       breathe 8s ease-in-out infinite 2s; /* Animasi berulang setelah muncul */
        }

        /* Teks Sub-judul */
        p {
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 5px;
            text-transform: uppercase;
            opacity: 0;
            transform: translateY(20px);
            animation: subReveal 1.5s ease-out 1.2s forwards;
        }

        /* Elemen Dekorasi Berputar */
        .spinner-wrapper {
            position: absolute;
            bottom: 50px;
            right: 50px;
            width: 60px;
            height: 60px;
            z-index: 20;
        }

        .spinner {
            width: 100%;
            height: 100%;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 2s linear infinite;
        }

        /* --- KEYFRAMES --- */
        
        @keyframes loadLine {
            0% { width: 0%; opacity: 0; }
            50% { opacity: 1; }
            100% { width: 100px; opacity: 0.5; }
        }

        @keyframes textReveal {
            to {
                clip-path: polygon(0 0, 100% 0, 100% 100%, 0% 100%);
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes subReveal {
            to {
                transform: translateY(0);
                opacity: 0.7;
            }
        }

        @keyframes breathe {
            0%, 100% { letter-spacing: -2px; }
            50% { letter-spacing: 0px; } /* Teks merenggang pelan */
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* --- MOBILE ADJUSTMENT --- */
        @media (max-width: 768px) {
            h1 { font-size: 15vw; letter-spacing: -1px; }
            p { font-size: 0.9rem; letter-spacing: 3px; }
            .spinner-wrapper { bottom: 30px; right: 50%; transform: translateX(50%); } /* Spinner pindah ke tengah bawah */
        }
    </style>
</head>
<body>

    <div class="ambient-light">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="container">
        <div class="loader-line"></div>
        <h1>Coming Soon</h1>
        <p>Experience The Future</p>
    </div>

    <div class="spinner-wrapper">
        <div class="spinner"></div>
    </div>

</body>
</html>
