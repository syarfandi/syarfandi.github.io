<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Segera Hadir - Tech</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: #111; /* Latar belakang gelap */
            color: #fff;
            overflow: hidden;
        }
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .content-overlay {
            position: absolute;
            z-index: 2;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 100%;
            max-width: 700px;
            padding: 20px;
            pointer-events: none; /* Agar mouse menembus ke partikel */
        }
        /* Mengaktifkan pointer events hanya untuk elemen interaktif */
        .content-overlay h1, .content-overlay p, .content-overlay .btn {
             pointer-events: auto;
        }

        h1 {
            font-size: 5vw;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 20px;
            color: #00d2ff; /* Warna aksen neon */
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.5);
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 40px;
            color: #aaa;
        }
        .btn {
            padding: 15px 40px;
            background: transparent;
            border: 2px solid #00d2ff;
            color: #00d2ff;
            font-weight: 800;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            display: inline-block;
        }
        .btn:hover {
            background: #00d2ff;
            color: #111;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.7);
        }
    </style>
</head>
<body>
    <div id="particles-js"></div>

    <div class="content-overlay">
        <h1>System Loading...</h1>
        <p>Platform masa depan sedang kami bangun. Bersiaplah untuk perubahan.</p>
        <a href="#" class="btn">Pelajari Lebih Lanjut</a>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#ffffff" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5, "random": false },
                "size": { "value": 3, "random": true },
                "line_linked": { "enable": true, "distance": 150, "color": "#00d2ff", "opacity": 0.4, "width": 1 },
                "move": { "enable": true, "speed": 3, "direction": "none", "random": false, "straight": false, "out_mode": "out", "bounce": false }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": {
                    "onhover": { "enable": true, "mode": "grab" }, /* Efek saat hover */
                    "onclick": { "enable": true, "mode": "push" },
                    "resize": true
                },
                "modes": {
                    "grab": { "distance": 140, "line_linked": { "opacity": 1 } }
                }
            },
            "retina_detect": true
        });
    </script>
</body>
</html>
