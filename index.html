<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akan Segera Hadir</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+Pro:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            height: 100%;
        }
        body {
            /* Ganti URL di bawah ini dengan gambar pilihan Anda */
            background: url('https://images.unsplash.com/photo-1497294815431-9365093b7331?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Source Sans Pro', sans-serif;
        }

        /* Efek Kaca (Glassmorphism) */
        .glass-card {
            background: rgba(255, 255, 255, 0.25); /* Putih transparan */
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            backdrop-filter: blur(10px); /* Kunci efek buram */
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            padding: 4rem 3rem;
            text-align: center;
            max-width: 600px;
            width: 90%;
            color: #333;
        }

        h1 {
            font-family: 'Playfair Display', serif; /* Font Serif untuk kesan elegan */
            font-size: 4rem;
            color: #222;
            margin-bottom: 1rem;
            line-height: 1.1;
        }

        p.subtitle {
            font-size: 1.3rem;
            color: #444;
            margin-bottom: 3rem;
            font-weight: 300;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 2rem;
        }
        
        .social-links a {
            text-decoration: none;
            color: #555;
            font-weight: bold;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .social-links a:hover {
            color: #000;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.8rem; }
            .glass-card { padding: 3rem 2rem; }
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <p style="text-transform: uppercase; letter-spacing: 3px; font-size: 0.9rem; margin-bottom: 10px;">Project Baru</p>
        <h1>Coming Soon.</h1>
        <p class="subtitle">Kami sedang menyeduh sesuatu yang spesial untuk Anda. Tunggu tanggal mainnya.</p>
        
        <div class="social-links">
            <a href="#">INSTAGRAM</a>
            <a href="#">TWITTER</a>
            <a href="#">EMAIL</a>
        </div>
    </div>
</body>
</html>
