            `).join('');

            document.getElementById('p-experienceList').innerHTML = t.experiences.map(e => `
                <div class="experience-item">
                    <div class="experience-header">
                        <span class="experience-title">${e.title}</span>
                        <span class="experience-date">${e.date}</span>
                    </div>
                    <div class="experience-company">${e.company}</div>
                    <ul class="experience-desc">${e.desc.map(d => `<li>${d}</li>`).join('')}</ul>
                </div>
            `).join('');

            document.getElementById('p-projectsGrid').innerHTML = t.projects.map(p => `
                <div style="background: #f8fafc; padding: 12px; border-radius: 8px; border-left: 4px solid var(--primary);">
                    <h4 style="font-size: 14px; margin-bottom: 4px;">${p.title}</h4>
                    <p style="font-size: 12px; color: var(--text-muted);">${p.desc}</p>
                </div>
            `).join('');

            // ATS Content
            fetch(t.atsFile)
                .then(r => {
                    if (!r.ok) throw new Error('File not found: ' + t.atsFile);
                    return r.text();
                })
                .then(md => { atsContent.innerHTML = marked.parse(md); })
                .catch(err => {
                    console.error(err);
                    atsContent.innerHTML = `<p style="color:red; padding: 20px;">Error loading CV: ${err.message}</p>`;
                });

            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        function setView(v) {
            view = v;
            if (view === 'premium') {
                premiumView.classList.add('active');
                atsView.classList.remove('active');
                togglePremium.classList.add('active');
                toggleATS.classList.remove('active');
            } else {
                premiumView.classList.remove('active');
                atsView.classList.add('active');
                togglePremium.classList.remove('active');
                toggleATS.classList.add('active');
            }
        }

        togglePremium.onclick = () => setView('premium');
                toggleATS.onclick = () => setView('ats');

        function setLang(l) {
            lang = l;
            if (lang === 'en') {
                toggleEN.classList.add('active');
                toggleID.classList.remove('active');
            } else {
                toggleEN.classList.remove('active');
                toggleID.classList.add('active');
            }
            updateContent();
        }

        toggleEN.onclick = () => setLang('en');
        toggleID.onclick = () => setLang('id');

        document.getElementById('downloadBtn').addEventListener('click', async () => {
            const isPremium = view === 'premium';
            const element = isPremium ? premiumView : atsContent;
            const downloadLabel = document.getElementById('downloadLabel');
            const originalLabel = downloadLabel.innerText;
            
            downloadLabel.innerText = "...";
            
            try {
                const clone = element.cloneNode(true);
                Object.assign(clone.style, {
                    position: 'absolute',
                    left: '0',
                    top: '10000px',
                    width: element.offsetWidth + 'px',
                    display: isPremium ? 'grid' : 'block',
                    background: 'white',
                    opacity: '1',
                    visibility: 'visible',
                    margin: '0',
                    boxShadow: 'none'
                });

                if (!isPremium) {
                    const markdown = clone.querySelector('.markdown-body') || clone;
                    markdown.style.display = 'block';
                    markdown.style.padding = '60px';
                }

                document.body.appendChild(clone);
                await new Promise(r => setTimeout(r, 1000));

                const widthPx = clone.offsetWidth;
                const heightPx = clone.scrollHeight;
                const mmWidth = widthPx * 0.264583;
                const mmHeight = (heightPx * 0.264583);

                const opt = {
                    margin: 0,
                    filename: `CV_Syarfandi_ProductManager_${lang}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2, useCORS: true, backgroundColor: '#ffffff' },
                    jsPDF: { unit: 'mm', format: [mmWidth, mmHeight], orientation: 'portrait', compress: true }
                };

                await html2pdf().set(opt).from(clone).save();
                document.body.removeChild(clone);
            } catch (err) {
                console.error("PDF Error:", err);
                alert("Gagal membuat PDF.");
            } finally {
                downloadLabel.innerText = originalLabel;
            }
        });

        document.getElementById('shareBtn').addEventListener('click', async () => {
            const url = window.location.href;
            if (navigator.share) {
                try { await navigator.share({ title: 'Achmad Syarfandi CV', url }); } catch (e) { }
            } else {
                navigator.clipboard.writeText(url);
                alert('Link copied!');
            }
        });

        updateContent();
        setView('ats'); // Initialize with ATS view
    </script>
</body>

</html>
