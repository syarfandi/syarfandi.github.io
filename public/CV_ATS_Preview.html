<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS CV Preview - Achmad Syarfandi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            line-height: 1.6;
            background-color: #f6f8fa;
            padding: 40px 20px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .action-buttons {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
            z-index: 1000;
        }
        .btn-compact {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: #fff;
            color: #24292f;
            border: 1px solid #d0d7de;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            transition: all 0.2s;
        }
        .btn-compact:hover { background: #f6f8fa; transform: translateY(-1px); }
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 6px 12px;
            background: #24292f;
            color: #fff;
            text-decoration: none;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .markdown-body {
            box-sizing: border-box;
            width: 100%;
            max-width: 850px;
            margin: 0 auto;
            padding: 45px;
            background-color: #fff;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            box-shadow: 0 8px 24px rgba(149, 157, 165, 0.2);
        }

        /* Optimasi PDF/Print khusus A4 */
        @media print {
            @page {
                size: A4;
                margin: 15mm;
            }
            html, body {
                background-color: #fff !important;
                padding: 0 !important;
                margin: 0 !important;
                display: block !important; /* Nonaktifkan flex saat print */
                height: auto !important;
                overflow: visible !important;
            }
            .action-buttons, .back-btn {
                display: none !important;
            }
            .markdown-body {
                max-width: 100% !important;
                padding: 0 !important;
                margin: 0 !important;
                border: none !important;
                box-shadow: none !important;
                width: 100% !important;
                color: #000 !important;
                display: block !important;
                overflow: visible !important;
            }
            
            /* Sembunyikan elemen dekoratif github-markdown yang mungkin mengganggu */
            .markdown-body::before, .markdown-body::after {
                display: none !important;
            }

            /* Aturan Agresif untuk Judul */
            h1, h2, h3, h4, h5, h6 {
                page-break-after: avoid !important;
                break-after: avoid !important;
                orphans: 5;
                widows: 5;
            }

            /* Memastikan section yang dibungkus JS tidak terpotong */
            .cv-section {
                display: table !important;
                width: 100% !important;
                page-break-inside: avoid !important;
                break-inside: avoid-page !important;
                margin-bottom: 15px !important;
            }

            /* List items jangan terbelah */
            li {
                page-break-inside: avoid !important;
                break-inside: avoid !important;
            }

            h2 {
                margin-top: 1.5em !important;
                border-bottom: 1px solid #eee !important;
                padding-bottom: 0.3em !important;
                page-break-after: avoid !important;
            }

            hr {
                border: none !important;
                border-top: 1px solid #ddd !important;
                margin: 2em 0 !important;
                page-break-after: always !important;
                visibility: hidden;
            }

            /* Memastikan konten tidak terpotong di tepi */
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }

        /* Border bantuan untuk verifikasi di layar (tidak ikut diprint) */
        .cv-section {
            outline: 2px solid red !important;
            margin-bottom: 10px;
            padding: 5px;
        }
    </style>
</head>
<body>
    <a href="/" class="back-btn"><i data-lucide="arrow-left" style="width:14px"></i> <span>Portfolio</span></a>
    
    <div class="action-buttons">
        <button id="shareBtn" class="btn-compact"><i data-lucide="share-2" style="width:14px"></i> <span id="shareText">Share</span></button>
        <button id="downloadBtn" class="btn-compact"><i data-lucide="download" style="width:14px"></i> <span id="downloadText">ATS PDF</span></button>
        <button id="langToggle" class="btn-compact"><i data-lucide="languages" style="width:14px"></i> <span id="langText">EN</span></button>
    </div>

    <article class="markdown-body" id="content">
        <p>Loading CV content...</p>
    </article>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        let currentLang = 'en';
        const content = document.getElementById('content');
        const langToggle = document.getElementById('langToggle');
        const langText = document.getElementById('langText');
        const downloadBtn = document.getElementById('downloadBtn');
        const downloadText = document.getElementById('downloadText');
        const shareBtn = document.getElementById('shareBtn');
        const shareText = document.getElementById('shareText');

        const files = {
            en: 'CV_DevOps_Achmad_Syarfandi.md',
            id: 'CV_DevOps_Achmad_Syarfandi_ID.md'
        };

        function loadCV(lang) {
            content.innerHTML = '<p>Loading CV content...</p>';
            fetch(files[lang])
                .then(response => {
                    if (!response.ok) throw new Error('File not found');
                    return response.text();
                })
                .then(text => {
                    console.log("Markdown loaded, parsing...");
                    const rawHtml = marked.parse(text);
                    const tempDiv = document.createElement('div');
                    tempDiv.innerHTML = rawHtml;
                    
                    // Pastikan skrip berjalan dengan mengubah warna background sebentar
                    document.body.style.border = "10px solid yellow";
                    setTimeout(() => { document.body.style.border = "none"; }, 2000);
                    
                    content.innerHTML = ''; 
                    
                    let currentSection = null;
                    const elements = Array.from(tempDiv.children);
                    
                    elements.forEach(el => {
                        if (/^H[1-6]$/.test(el.tagName)) {
                            currentSection = document.createElement('div');
                            currentSection.className = 'cv-section';
                            // Paksa style di sini agar pasti muncul
                            currentSection.style.outline = "2px solid red";
                            currentSection.style.display = "block";
                            currentSection.style.marginBottom = "15px";
                            content.appendChild(currentSection);
                            currentSection.appendChild(el);
                        } else if (currentSection && el.tagName !== 'HR') {
                            currentSection.appendChild(el);
                        } else {
                            if (el.tagName === 'HR') {
                                currentSection = null;
                                content.appendChild(el);
                            } else {
                                const wrapper = document.createElement('div');
                                wrapper.className = 'cv-section';
                                wrapper.style.outline = "2px solid red";
                                wrapper.appendChild(el);
                                content.appendChild(wrapper);
                            }
                        }
                    });
                    
                    console.log("Wrapping complete.");
                    lucide.createIcons();
                })
                .catch(err => {
                    content.innerHTML = `<h1 style="color:red">Error loading CV</h1><p>${err.message}</p>`;
                });
        }

        langToggle.addEventListener('click', () => {
            currentLang = currentLang === 'en' ? 'id' : 'en';
            langText.innerText = currentLang === 'en' ? 'EN' : 'ID';
            downloadText.innerText = currentLang === 'en' ? 'ATS PDF' : 'PDF ATS';
            shareText.innerText = currentLang === 'en' ? 'Share' : 'Bagikan';
            loadCV(currentLang);
        });

        downloadBtn.addEventListener('click', () => {
            window.print();
        });

        shareBtn.addEventListener('click', async () => {
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Achmad Syarfandi - DevOps ATS CV',
                        url: window.location.href
                    });
                } catch (err) {
                    console.log('Error sharing:', err);
                }
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert('Link copied to clipboard!');
            }
        });

        loadCV(currentLang);
        lucide.createIcons();
    </script>
</body>
</html>
