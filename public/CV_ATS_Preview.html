<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS CV Preview - Achmad Syarfandi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            line-height: 1.6;
            background-color: #f6f8fa;
            padding: 40px 20px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .action-buttons {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
            z-index: 1000;
        }
        .btn-compact {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: #fff;
            color: #24292f;
            border: 1px solid #d0d7de;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            transition: all 0.2s;
        }
        .btn-compact:hover { background: #f6f8fa; transform: translateY(-1px); }
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 6px 12px;
            background: #24292f;
            color: #fff;
            text-decoration: none;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .markdown-body {
            box-sizing: border-box;
            width: 100%;
            max-width: 850px;
            margin: 0 auto;
            padding: 45px;
            background-color: #fff;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            box-shadow: 0 8px 24px rgba(149, 157, 165, 0.2);
        }
    </style>
</head>
<body>
    <a href="/" class="back-btn"><i data-lucide="arrow-left" style="width:14px"></i> <span>Portfolio</span></a>
    
    <div class="action-buttons">
        <button id="shareBtn" class="btn-compact"><i data-lucide="share-2" style="width:14px"></i> <span id="shareText">Share</span></button>
        <button id="downloadBtn" class="btn-compact"><i data-lucide="download" style="width:14px"></i> <span id="downloadText">ATS PDF</span></button>
        <button id="langToggle" class="btn-compact"><i data-lucide="languages" style="width:14px"></i> <span id="langText">EN</span></button>
    </div>

    <article class="markdown-body" id="content">
        <p>Loading CV content...</p>
    </article>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        let currentLang = 'en';
        const content = document.getElementById('content');
        const langToggle = document.getElementById('langToggle');
        const langText = document.getElementById('langText');
        const downloadBtn = document.getElementById('downloadBtn');
        const downloadText = document.getElementById('downloadText');
        const shareBtn = document.getElementById('shareBtn');
        const shareText = document.getElementById('shareText');

        const files = {
            en: 'CV_DevOps_Achmad_Syarfandi.md',
            id: 'CV_DevOps_Achmad_Syarfandi_ID.md'
        };

        function loadCV(lang) {
            content.innerHTML = '<p>Loading CV content...</p>';
            fetch(files[lang])
                .then(response => {
                    if (!response.ok) throw new Error('File not found');
                    return response.text();
                })
                .then(text => {
                    content.innerHTML = marked.parse(text);
                })
                .catch(err => {
                    content.innerHTML = `<h1 style="color:red">Error loading CV</h1><p>${err.message}</p>`;
                });
        }

        langToggle.addEventListener('click', () => {
            currentLang = currentLang === 'en' ? 'id' : 'en';
            langText.innerText = currentLang === 'en' ? 'EN' : 'ID';
            downloadText.innerText = currentLang === 'en' ? 'ATS PDF' : 'PDF ATS';
            shareText.innerText = currentLang === 'en' ? 'Share' : 'Bagikan';
            loadCV(currentLang);
        });

        downloadBtn.addEventListener('click', () => {
            window.print();
        });

        shareBtn.addEventListener('click', async () => {
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Achmad Syarfandi - DevOps ATS CV',
                        url: window.location.href
                    });
                } catch (err) {
                    console.log('Error sharing:', err);
                }
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert('Link copied to clipboard!');
            }
        });

        loadCV(currentLang);
        lucide.createIcons();
    </script>
</body>
</html>
