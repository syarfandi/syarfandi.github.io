                atsFile: "/CV_DataAnalyst_Achmad_Syarfandi_ID.md",
                viewLabels: { premium: "Visual", ats: "ATS" },
                btnLabels: { share: "Bagikan", pdf: "PDF", back: "Kembali" }
            }
        };

        let lang = 'en';
        let view = 'ats'; // Default to ATS

        const premiumView = document.getElementById('premium-view');
        const atsView = document.getElementById('ats-view');
        const atsContent = document.getElementById('ats-content');
        const toggleEN = document.getElementById('toggleEN');
        const toggleID = document.getElementById('toggleID');
        const togglePremium = document.getElementById('togglePremium');
        const toggleATS = document.getElementById('toggleATS');
        const shareLabel = document.getElementById('shareLabel');
        const downloadLabel = document.getElementById('downloadLabel');
        const backLabel = document.getElementById('backLabel');

        function updateContent() {
            const t = translations[lang];

            // Labels
            shareLabel.innerText = t.btnLabels.share;
            downloadLabel.innerText = t.btnLabels.pdf;
            backLabel.innerText = t.btnLabels.back;
            document.getElementById('labelPremium').innerText = t.viewLabels.premium;
            document.getElementById('labelATS').innerText = t.viewLabels.ats;

            // Premium Elements
            document.getElementById('p-role').innerText = t.role;
            document.getElementById('p-locText').innerText = t.locText;
            document.getElementById('p-skillsTitle').innerText = t.skillsTitle;
            document.getElementById('p-certsTitle').innerText = t.certsTitle;
            document.getElementById('p-summaryTitle').innerText = t.summaryTitle;
            document.getElementById('p-expTitle').innerText = t.expTitle;
            document.getElementById('p-eduTitle').innerText = t.eduTitle;
            document.getElementById('p-projectsTitle').innerText = t.projectsTitle;
            document.getElementById('p-summaryText').innerHTML = t.summary;

            document.getElementById('p-skillList').innerHTML = t.skills.map(s => `
                <div class="skill-item">
                    <span class="skill-name">${s.name}</span>
                    <div class="skill-bar"><div class="skill-progress" style="width: ${s.level}%;"></div></div>
                </div>
            `).join('');

            document.getElementById('p-certList').innerHTML = t.certs.map(c => `
                <p style="margin-bottom: 10px;"><strong style="color: white; display: block;">${c.title}</strong> ${c.issuer} ${c.date ? '(' + c.date + ')' : ''}</p>
            `).join('');

            document.getElementById('p-experienceList').innerHTML = t.experiences.map(e => `
                <div class="experience-item">
                    <div class="experience-header">
                        <span class="experience-title">${e.title}</span>
                        <span class="experience-date">${e.date}</span>
                    </div>
                    <div class="experience-company">${e.company}</div>
                    <ul class="experience-desc">${e.desc.map(d => `<li>${d}</li>`).join('')}</ul>
                </div>
            `).join('');

            document.getElementById('p-projectsGrid').innerHTML = t.projects.map(p => `
                <div style="background: #f8fafc; padding: 12px; border-radius: 8px; border-left: 4px solid var(--primary);">
                    <h4 style="font-size: 14px; margin-bottom: 4px;">${p.title}</h4>
                    <p style="font-size: 12px; color: var(--text-muted);">${p.desc}</p>
                </div>
            `).join('');

            // ATS Content
            fetch(t.atsFile)
                .then(r => {
                    if (!r.ok) throw new Error('File not found: ' + t.atsFile);
                    return r.text();
                })
                .then(md => { atsContent.innerHTML = marked.parse(md); })
                .catch(err => {
                    console.error(err);
                    atsContent.innerHTML = `<p style="color:red; padding: 20px;">Error loading CV: ${err.message}</p>`;
                });

            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        function setView(v) {
            view = v;
            if (view === 'premium') {
                premiumView.classList.add('active');
                atsView.classList.remove('active');
                togglePremium.classList.add('active');
                toggleATS.classList.remove('active');
            } else {
                premiumView.classList.remove('active');
                atsView.classList.add('active');
                togglePremium.classList.remove('active');
                toggleATS.classList.add('active');
            }
        }

        togglePremium.onclick = () => setView('premium');
        toggleATS.onclick = () => setView('ats');

        function setLang(l) {
            lang = l;
            if (lang === 'en') {
                toggleEN.classList.add('active');
                toggleID.classList.remove('active');
            } else {
                toggleEN.classList.remove('active');
                toggleID.classList.add('active');
            }
            updateContent();
        }

        toggleEN.onclick = () => setLang('en');
        toggleID.onclick = () => setLang('id');

        document.getElementById('downloadBtn').addEventListener('click', async () => {
            const element = view === 'premium' ? premiumView : atsContent;
            const downloadLabel = document.getElementById('downloadLabel');
            const originalLabel = downloadLabel.innerText;
            
            downloadLabel.innerText = "...";
            
            // Save original scroll position
            const scrollY = window.scrollY;
            const scrollX = window.scrollX;
            
            // Scroll to top to ensure clean capture
            window.scrollTo(0, 0);
            
            try {
                // Give browser time to stabilize after scroll
                await new Promise(r => setTimeout(r, 300));
                
                const originalStyle = element.style.cssText;
                // Force background and remove any potential hidden overflows
                element.style.background = "white";
                element.style.overflow = "visible";
                element.style.height = "auto";
                
                const opt = {
                    margin: 0,
                    filename: `CV_Syarfandi_data-analyst_${lang}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { 
                        scale: 2, 
                        useCORS: true,
                        allowTaint: true,
                        scrollY: 0,
                        scrollX: 0,
                        windowWidth: element.offsetWidth
                    },
                    jsPDF: { unit: 'mm', orientation: 'portrait' }
                };

                const widthPx = element.offsetWidth;
                const heightPx = element.scrollHeight;
                const mmWidth = widthPx * 0.264583;
                const mmHeight = (heightPx * 0.264583) + 2;
                
                opt.jsPDF.format = [mmWidth, mmHeight];

                await html2pdf().set(opt).from(element).save();
                
                element.style.cssText = originalStyle;
            } catch (err) {
                console.error("PDF Error:", err);
                alert("Error: " + err.message);
            } finally {
                // Restore scroll position
                window.scrollTo(scrollX, scrollY);
                downloadLabel.innerText = originalLabel;
            }
        });

document.getElementById('shareBtn').addEventListener('click', async () => {
            const url = window.location.href;
            if (navigator.share) {
                try { await navigator.share({ title: 'Achmad Syarfandi CV', url }); } catch (e) { }
            } else {
                navigator.clipboard.writeText(url);
                alert('Link copied!');
            }
        });

        updateContent();
        setView('ats'); // Initialize with ATS view
    </script>
</body>

</html>
